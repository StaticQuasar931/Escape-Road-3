<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escape Road 3</title>
  <meta name="description" content="Escape Road 3 WebGL build">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div class="loading-backdrop"></div>
      <div class="loading-panel">
        <img class="loading-thumb" src="thumb.png" alt="Escape Road 3 thumbnail">
        <div class="loading-copy">
          <div class="loading-title">Escape Road 3</div>
          <div class="loading-subtitle" id="loading-text">Loading...</div>
        </div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <div id="unity-warning" hidden></div>
    <div id="unity-error" hidden></div>
  </div>

  <script>
    const signedDomainToken = "eyJzaWduZWQiOiJJaHQ2XC9qdTRUWk15dTljNUhNbWNmekM2QWFmdXFIbGlqOFNcL1ZNNGJxOFVERXZ2czBwc3gwZUZQNEdWSkVWNmVFU2FMaGV1UERNMnEwOVVhUFRLODFJbVpVYnBpTndMXC9wNENcL2R2RWRkanlQK1RyUFFqazNLOUxOM0ZNRDluN0hSXC9ZblAxRmJYTkxoOG0zY3ZLT1JjaWdyXC9Na1JJQnV4SndQaWlvTlFMTVVPbkIzUmZUUkV1czBXbThJK3l4WEdzWUttSVhrT1lGT2hMXC8xb29NNG1hYWswMHZCaFwvZ2J1T09DRDBmZE82K2k3WVFuQUpvQUlBVTNtVXZUc0g4bWN3XC9qUmtTc3E5a2hWdktWVStnem4rZndveVpKWDFWTE00alwvUzZWdVF5SGJoSWEzM0d6U2hjUDZYQXpUUTBIOWpsc2pzNU83aEx4alVkUlcrSDFsZW9RPT0iLCJhcCI6InllcyIsImhuIjoiZ2FtZWEuYXpnYW1lLmlvIiwiZG9tYWluIjoiYXpnYW1lLmlvIiwicyI6InllcyIsInN0eXBlIjoyfQ==";
    const gamesdkUrlPattern = /api\.cdnwave\.com\/sdkdom\/gamesdk/i;

    function encodeBase64(value) {
      return btoa(unescape(encodeURIComponent(value)));
    }

    function decodeBase64Json(value) {
      try {
        return JSON.parse(decodeURIComponent(escape(atob(value))));
      } catch (error) {
        return null;
      }
    }

    const signedDomainData = decodeBase64Json(signedDomainToken) || {};
    const verifiedSignature = signedDomainData.signed || "";
    const allowedHosts = [
      location.hostname,
      "staticquasar931.github.io",
      "gamea.azgame.io",
      "games.azgame.io",
      "azgame.io"
    ];

    const unityGameInfoObject = {
      allowPlay: true,
      allow_play: true,
      locked: false,
      block: false,
      blocked: false,
      hosted: true,
      sdkType: "gm",
      sdk_type: "gm",
      gameId: "escape-road-3",
      gameName: "Escape Road 3",
      gdGameKey: "escape-road-3-az",
      gd_game_key: "escape-road-3-az",
      moreGamesUrl: "",
      more_games_url: "",
      promotion: [],
      promotions: [],
      veryfiedDomainData: {
        whiteListDomain: allowedHosts,
        veryfiedSignature: verifiedSignature,
        domain: location.hostname,
        host: location.hostname
      },
      whiteListDomain: allowedHosts,
      veryfiedSignature: verifiedSignature,
      domain: location.hostname,
      host: location.hostname
    };

    const unityAdInfoObject = {
      adsEnabled: false,
      rewardedEnabled: false,
      interstitialEnabled: false,
      bannerEnabled: false,
      adTag: "",
      placements: []
    };

    const unityGameInfoParam = encodeBase64(JSON.stringify(unityGameInfoObject));
    const unityAdInfoParam = encodeBase64(JSON.stringify(unityAdInfoObject));

    const unlockedGameInfoResponse = {
      success: true,
      status: "success",
      message: "ok",
      error: null,
      sdk_type: "gm",
      sdkName: "gm",
      sdkVersion: "latest",
      allow_play: true,
      allow: true,
      allowPlay: true,
      block: false,
      blocked: false,
      locked: false,
      hosted: true,
      game: "escape-road-3",
      gameid: "escape-road-3",
      gameId: "escape-road-3",
      gameName: "Escape Road 3",
      gd_game_key: "escape-road-3-az",
      more_games_url: "",
      domains: [],
      hosts: allowedHosts,
      allowedHost: location.hostname,
      allowedHosts: allowedHosts,
      sitelockVersion: 2,
      allowLocalHost: true,
      allowCollectionPI: false,
      version: "26040702",
      title: "Escape Road 3",
      messageStr: "ok",
      errorReason: "",
      gameInfoParam: unityGameInfoParam,
      adParam: unityAdInfoParam,
      data: unityGameInfoParam,
      game_info: unityGameInfoParam,
      ad_info: unityAdInfoParam,
      config: unityGameInfoObject,
      gameInfo: unityGameInfoObject,
      result: {
        success: true,
        data: unityGameInfoParam,
        adData: unityAdInfoParam
      }
    };

    function makeGamesdkResponseBody() {
      return JSON.stringify(unlockedGameInfoResponse);
    }

    function isGamesdkUrl(url) {
      return typeof url === "string" && gamesdkUrlPattern.test(url);
    }

    function createGamesdkResponse() {
      return new Response(makeGamesdkResponseBody(), {
        status: 200,
        headers: {
          "Content-Type": "application/json"
        }
      });
    }

    try {
      localStorage.setItem("gmsdksigndomain", signedDomainToken);
      localStorage.setItem("gm_game_info", makeGamesdkResponseBody());
      localStorage.setItem("gameInfoResponse", makeGamesdkResponseBody());
      localStorage.setItem("gm_game_info_param", unityGameInfoParam);
      localStorage.setItem("gm_ad_info_param", unityAdInfoParam);
    } catch (error) {}

    function firebaseLogEvent() {}
    function firebaseLogEventParameter() {}
    function firebaseSetUserProperties() {}
    function gmEvent() {}
    function gmStartGame(callbackFunction) {
      if (typeof callbackFunction === "function") {
        callbackFunction();
      }
    }
    function gmStartAds(callbackFunction) {
      if (typeof callbackFunction === "function") {
        callbackFunction();
      }
    }
    function SetSDKType() {}

    window.firebaseLogEvent = window.firebaseLogEvent || firebaseLogEvent;
    window.firebaseLogEventParameter = window.firebaseLogEventParameter || firebaseLogEventParameter;
    window.firebaseSetUserProperties = window.firebaseSetUserProperties || firebaseSetUserProperties;
    window.gmEvent = window.gmEvent || gmEvent;
    window.gmStartGame = window.gmStartGame || gmStartGame;
    window.gmStartAds = window.gmStartAds || gmStartAds;
    window.SetSDKType = window.SetSDKType || SetSDKType;
    window.GMSOFT_SDKTYPE = "gm";
    window.sdkType = "gm";

    window.GMGameSDK = window.GMGameSDK || {
      init: function() {
        return {
          setVersion: function() {
            return this;
          }
        };
      },
      trackEvent: function() {},
      trackEventParams: function() {}
    };

    window.GMSDK = window.GMSDK || {};
    window.GMSDK.SetSDKType = window.GMSDK.SetSDKType || SetSDKType;
    window.GMSDK.SetGameInfoParam = window.GMSDK.SetGameInfoParam || function() {
      return unityGameInfoParam;
    };

    window.GMAdvertisementManager = window.GMAdvertisementManager || {};
    window.GMAdvertisementManager.SetAdParam = window.GMAdvertisementManager.SetAdParam || function() {
      return unityAdInfoParam;
    };

    window.GMAnalytics = window.GMAnalytics || {
      LogEvent: function() {}
    };

    const nativeFetch = window.fetch ? window.fetch.bind(window) : null;
    if (nativeFetch) {
      window.fetch = function(resource, init) {
        const url = typeof resource === "string" ? resource : resource && resource.url;
        if (isGamesdkUrl(url)) {
          return Promise.resolve(createGamesdkResponse());
        }
        return nativeFetch(resource, init).then(function(response) {
          return response;
        });
      };
    }

    (function() {
      const nativeOpen = XMLHttpRequest.prototype.open;
      const nativeSend = XMLHttpRequest.prototype.send;
      const nativeSetRequestHeader = XMLHttpRequest.prototype.setRequestHeader;
      const nativeGetResponseHeader = XMLHttpRequest.prototype.getResponseHeader;
      const nativeGetAllResponseHeaders = XMLHttpRequest.prototype.getAllResponseHeaders;

      XMLHttpRequest.prototype.open = function(method, url) {
        this.__codexGamesdkUrl = typeof url === "string" ? url : "";
        this.__codexGamesdkIntercept = isGamesdkUrl(this.__codexGamesdkUrl);
        if (!this.__codexGamesdkIntercept) {
          return nativeOpen.apply(this, arguments);
        }
        this.readyState = 1;
        if (typeof this.onreadystatechange === "function") {
          this.onreadystatechange();
        }
      };

      XMLHttpRequest.prototype.setRequestHeader = function(name, value) {
        if (this.__codexGamesdkIntercept) {
          return;
        }
        return nativeSetRequestHeader.call(this, name, value);
      };

      XMLHttpRequest.prototype.send = function() {
        if (!this.__codexGamesdkIntercept) {
          return nativeSend.apply(this, arguments);
        }

        const payload = makeGamesdkResponseBody();
        Object.defineProperty(this, "readyState", { configurable: true, value: 4 });
        Object.defineProperty(this, "status", { configurable: true, value: 200 });
        Object.defineProperty(this, "statusText", { configurable: true, value: "OK" });
        Object.defineProperty(this, "responseText", { configurable: true, value: payload });
        Object.defineProperty(this, "response", { configurable: true, value: payload });

        if (typeof this.onreadystatechange === "function") {
          this.onreadystatechange();
        }
        if (typeof this.onload === "function") {
          this.onload();
        }
        if (typeof this.onloadend === "function") {
          this.onloadend();
        }
      };

      XMLHttpRequest.prototype.getResponseHeader = function(name) {
        if (this.__codexGamesdkIntercept) {
          return name && name.toLowerCase() === "content-type" ? "application/json" : null;
        }
        return nativeGetResponseHeader.call(this, name);
      };

      XMLHttpRequest.prototype.getAllResponseHeaders = function() {
        if (this.__codexGamesdkIntercept) {
          return "content-type: application/json\r\n";
        }
        return nativeGetAllResponseHeaders.call(this);
      };
    })();

    const buildUrl = "Build";
    const productVersion = "26040702";
    const loaderUrl = buildUrl + "/escape-road-3-v" + productVersion + ".loader.js";
    const config = {
      dataUrl: buildUrl + "/escape-road-3-v" + productVersion + ".data.unityweb",
      frameworkUrl: buildUrl + "/escape-road-3-v" + productVersion + ".framework.js.unityweb",
      codeUrl: buildUrl + "/escape-road-3-v" + productVersion + ".wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Escape Road 3",
      productName: "Escape Road 3",
      productVersion: productVersion,
      autoSyncPersistentDataPath: true,
      showBanner: function(message, type) {
        const warning = document.getElementById("unity-warning");
        warning.hidden = false;
        warning.textContent = message;
        warning.className = type === "error" ? "unity-banner error" : "unity-banner warning";
        if (type !== "error") {
          setTimeout(function() {
            warning.hidden = true;
            warning.textContent = "";
          }, 5000);
        }
      }
    };

    const requiredFiles = [
      loaderUrl,
      config.dataUrl,
      config.frameworkUrl,
      config.codeUrl
    ];

    const container = document.getElementById("unity-container");
    const canvas = document.getElementById("unity-canvas");
    const loadingBar = document.getElementById("unity-loading-bar");
    const progressBarFull = document.getElementById("unity-progress-bar-full");
    const loadingText = document.getElementById("loading-text");
    const errorPanel = document.getElementById("unity-error");

    function setFatalError(message) {
      errorPanel.hidden = false;
      errorPanel.textContent = message;
      errorPanel.className = "unity-banner error fatal";
    }

    async function fileExists(path) {
      try {
        const response = await fetch(path, { method: "HEAD" });
        return response.ok;
      } catch (error) {
        return false;
      }
    }

    async function verifyFiles() {
      const checks = await Promise.all(requiredFiles.map(async function(path) {
        return { path: path, exists: await fileExists(path) };
      }));
      return checks.filter(function(entry) {
        return !entry.exists;
      }).map(function(entry) {
        return entry.path;
      });
    }

    function removeLockOverlay() {
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_ELEMENT);
      let node;
      while ((node = walker.nextNode())) {
        const text = (node.textContent || "").trim();
        if (!text) {
          continue;
        }
        if (text === "Escape Road 3 is locked." || text === "Escape Road 3 is locked") {
          node.style.display = "none";
          node.setAttribute("aria-hidden", "true");
        }
      }
    }

    function observeLockOverlay() {
      removeLockOverlay();
      const observer = new MutationObserver(function() {
        removeLockOverlay();
      });
      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });
    }

    function requestFullscreen(event) {
      if (document.fullscreenElement) {
        return;
      }
      if (event && event.type === "pointerdown" && event.button !== 0) {
        return;
      }
      if (container.requestFullscreen) {
        container.requestFullscreen().catch(function() {});
      }
    }

    function unlockAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return;
      }
      try {
        const context = window.__escapeRoadAudioContext || new AudioContextClass();
        window.__escapeRoadAudioContext = context;
        if (context.state === "suspended") {
          context.resume().catch(function() {});
        }
      } catch (error) {}
    }

    function installInteractionHandlers() {
      const activate = function(event) {
        unlockAudio();
        requestFullscreen(event);
      };
      window.addEventListener("pointerdown", activate, { passive: true });
      window.addEventListener("keydown", activate, { passive: true });
      window.addEventListener("touchstart", activate, { passive: true });
    }

    function feedUnitySdkParameters() {
      const instance = window.unityInstance;
      if (!instance || typeof instance.SendMessage !== "function") {
        return false;
      }

      const calls = [
        ["GMSDK", "SetGameInfoParam", unityGameInfoParam],
        ["GMAdvertisementManager", "SetAdParam", unityAdInfoParam]
      ];

      let sent = false;
      calls.forEach(function(entry) {
        try {
          instance.SendMessage(entry[0], entry[1], entry[2]);
          sent = true;
        } catch (error) {}
      });
      return sent;
    }

    function scheduleUnitySdkFeed() {
      const delays = [0, 150, 400, 900, 1600, 2600, 4000];
      delays.forEach(function(delay) {
        setTimeout(function() {
          feedUnitySdkParameters();
        }, delay);
      });
    }

    async function bootGame() {
      const missing = await verifyFiles();
      if (missing.length) {
        setFatalError("Missing required file" + (missing.length > 1 ? "s" : "") + ": " + missing.join(", "));
        return;
      }

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
          progressBarFull.style.width = percent + "%";
          loadingText.textContent = percent >= 100 ? "Starting game..." : "Loading... " + percent + "%";
        }).then(function(unityInstance) {
          window.unityInstance = unityInstance;
          loadingBar.style.display = "none";
          canvas.focus();
          installInteractionHandlers();
          scheduleUnitySdkFeed();
        }).catch(function(message) {
          setFatalError(typeof message === "string" ? message : "Unity failed to start. Check the browser console for details.");
        });
      };
      script.onerror = function() {
        setFatalError("The Unity loader script could not be loaded.");
      };
      document.body.appendChild(script);
    }

    if (location.protocol === "file:") {
      setFatalError("This build must be served from a local web server. Opening index.html directly with file:// will not work for Unity WebGL.");
    } else {
      observeLockOverlay();
      bootGame();
    }
  </script>
</body>
