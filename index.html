<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escape Road 3</title>
  <meta name="description" content="Play Escape Road 3 in your browser.">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Browser Build</p>
      <h1>Escape Road 3</h1>
      <p class="summary">A cleaned-up local launcher for the Unity WebGL build, using your current root Build and StreamingAssets folders.</p>
    </section>

    <section class="player-card">
      <div id="loading-panel" class="loading-panel">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-copy">
          <p class="loading-label">Loading</p>
          <p class="loading-text" id="loading-text">Preparing game files...</p>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div id="error-panel" class="status-card error" hidden></div>

      <div id="unity-container" class="unity-shell" hidden>
        <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
      </div>
    </section>
  </main>

  <script>
    const buildBase = "Build";
    const version = "26040702";
    const loaderUrl = buildBase + "/escape-road-3-v" + version + ".loader.js";
    const config = {
      dataUrl: buildBase + "/escape-road-3-v" + version + ".data.unityweb",
      frameworkUrl: buildBase + "/escape-road-3-v" + version + ".framework.js.unityweb",
      codeUrl: buildBase + "/escape-road-3-v" + version + ".wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Escape Road 3",
      productName: "Escape Road 3",
      productVersion: version
    };

    const requiredFiles = [
      loaderUrl,
      config.dataUrl,
      config.frameworkUrl,
      config.codeUrl,
      config.streamingAssetsUrl + "/UnityServicesProjectConfiguration.json"
    ];

    const progressFill = document.getElementById("progress-fill");
    const loadingText = document.getElementById("loading-text");
    const loadingPanel = document.getElementById("loading-panel");
    const unityContainer = document.getElementById("unity-container");
    const canvas = document.getElementById("unity-canvas");
    const errorPanel = document.getElementById("error-panel");

    function setError(message) {
      errorPanel.hidden = false;
      errorPanel.textContent = message;
      loadingText.textContent = "Unable to start the game.";
    }

    async function fileExists(path) {
      try {
        const response = await fetch(path, { method: "HEAD" });
        return response.ok;
      } catch (error) {
        return false;
      }
    }

    async function verifyFiles() {
      const checks = await Promise.all(requiredFiles.map(async function(path) {
        return { path: path, exists: await fileExists(path) };
      }));

      return checks.filter(function(entry) {
        return !entry.exists;
      }).map(function(entry) {
        return entry.path;
      });
    }

    async function bootGame() {
      const missing = await verifyFiles();
      if (missing.length) {
        setError("Missing required file" + (missing.length > 1 ? "s" : "") + ": " + missing.join(", "));
        return;
      }

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
          progressFill.style.width = percent + "%";
          loadingText.textContent = percent >= 100 ? "Starting game..." : "Downloading game files... " + percent + "%";
        }).then(function() {
          loadingPanel.hidden = true;
          unityContainer.hidden = false;
          progressFill.style.width = "100%";
          loadingText.textContent = "Game ready";
          window.focus();
        }).catch(function(error) {
          setError(typeof error === "string" ? error : "Unity failed to start. Check the browser console for details.");
        });
      };
      script.onerror = function() {
        setError("The Unity loader script could not be loaded.");
      };
      document.body.appendChild(script);
    }

    if (location.protocol === "file:") {
      setError("This build must be served from a local web server. Opening index.html directly with file:// will not work for Unity WebGL.");
    } else {
      bootGame();
    }
  </script>
</body>
</html>
