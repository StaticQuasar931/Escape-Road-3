<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escape Road 3</title>
  <meta name="description" content="Escape Road 3 WebGL build">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div class="loading-panel">
        <div class="loading-title">Escape Road 3</div>
        <div class="loading-subtitle" id="loading-text">Loading...</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <div id="unity-warning" hidden></div>
    <div id="unity-error" hidden></div>
  </div>

  <script>
    window.firebaseLogEvent = window.firebaseLogEvent || function() {};
    window.firebaseLogEventParameter = window.firebaseLogEventParameter || function() {};
    window.firebaseSetUserProperties = window.firebaseSetUserProperties || function() {};
    window.gmEvent = window.gmEvent || function() {};
    window.gmStartGame = window.gmStartGame || function(callbackFunction) {
      if (typeof callbackFunction === "function") {
        callbackFunction();
      }
    };
    window.gmStartAds = window.gmStartAds || function(callbackFunction) {
      if (typeof callbackFunction === "function") {
        callbackFunction();
      }
    };
    window.GMGameSDK = window.GMGameSDK || {
      init: function() {
        return {
          setVersion: function() {
            return this;
          }
        };
      },
      trackEvent: function() {},
      trackEventParams: function() {}
    };
    window.GMSDK = window.GMSDK || {
      SetSDKType: function() {}
    };
    window.SetSDKType = window.SetSDKType || function() {};
    window.GMAnalytics = window.GMAnalytics || {
      LogEvent: function() {}
    };
    window.GMSOFT_SDKTYPE = "gm";

    const buildUrl = "Build";
    const productVersion = "26040702";
    const loaderUrl = buildUrl + "/escape-road-3-v" + productVersion + ".loader.js";
    const config = {
      dataUrl: buildUrl + "/escape-road-3-v" + productVersion + ".data.unityweb",
      frameworkUrl: buildUrl + "/escape-road-3-v" + productVersion + ".framework.js.unityweb",
      codeUrl: buildUrl + "/escape-road-3-v" + productVersion + ".wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Escape Road 3",
      productName: "Escape Road 3",
      productVersion: productVersion,
      autoSyncPersistentDataPath: true,
      showBanner: function(message, type) {
        const warning = document.getElementById("unity-warning");
        warning.hidden = false;
        warning.textContent = message;
        warning.className = type === "error" ? "unity-banner error" : "unity-banner warning";
        if (type !== "error") {
          setTimeout(function() {
            warning.hidden = true;
            warning.textContent = "";
          }, 5000);
        }
      }
    };

    const requiredFiles = [
      loaderUrl,
      config.dataUrl,
      config.frameworkUrl,
      config.codeUrl
    ];

    const container = document.getElementById("unity-container");
    const canvas = document.getElementById("unity-canvas");
    const loadingBar = document.getElementById("unity-loading-bar");
    const progressBarFull = document.getElementById("unity-progress-bar-full");
    const loadingText = document.getElementById("loading-text");
    const errorPanel = document.getElementById("unity-error");

    function setFatalError(message) {
      errorPanel.hidden = false;
      errorPanel.textContent = message;
      errorPanel.className = "unity-banner error fatal";
    }

    async function fileExists(path) {
      try {
        const response = await fetch(path, { method: "HEAD" });
        return response.ok;
      } catch (error) {
        return false;
      }
    }

    async function verifyFiles() {
      const checks = await Promise.all(requiredFiles.map(async function(path) {
        return { path: path, exists: await fileExists(path) };
      }));
      return checks.filter(function(entry) {
        return !entry.exists;
      }).map(function(entry) {
        return entry.path;
      });
    }

    function requestFullscreen() {
      if (document.fullscreenElement) {
        return;
      }
      if (container.requestFullscreen) {
        container.requestFullscreen().catch(function() {});
      }
    }

    function unlockAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return;
      }
      try {
        const context = window.__escapeRoadAudioContext || new AudioContextClass();
        window.__escapeRoadAudioContext = context;
        if (context.state === "suspended") {
          context.resume().catch(function() {});
        }
      } catch (error) {}
    }

    function installInteractionHandlers() {
      const activate = function() {
        unlockAudio();
        requestFullscreen();
      };
      window.addEventListener("pointerdown", activate, { passive: true });
      window.addEventListener("keydown", activate, { passive: true });
      window.addEventListener("touchstart", activate, { passive: true });
    }

    async function bootGame() {
      const missing = await verifyFiles();
      if (missing.length) {
        setFatalError("Missing required file" + (missing.length > 1 ? "s" : "") + ": " + missing.join(", "));
        return;
      }

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
          progressBarFull.style.width = percent + "%";
          loadingText.textContent = percent >= 100 ? "Starting game..." : "Loading... " + percent + "%";
        }).then(function(unityInstance) {
          window.unityInstance = unityInstance;
          loadingBar.style.display = "none";
          canvas.focus();
          installInteractionHandlers();
          requestFullscreen();
        }).catch(function(message) {
          setFatalError(typeof message === "string" ? message : "Unity failed to start. Check the browser console for details.");
        });
      };
      script.onerror = function() {
        setFatalError("The Unity loader script could not be loaded.");
      };
      document.body.appendChild(script);
    }

    if (location.protocol === "file:") {
      setFatalError("This build must be served from a local web server. Opening index.html directly with file:// will not work for Unity WebGL.");
    } else {
      bootGame();
    }
  </script>
</body>
</html>
